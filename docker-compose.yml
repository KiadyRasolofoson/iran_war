services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iran-war-web
    ports:
      - "8080:80"
    env_file:
      - .env
    environment:
      APP_URL: ${APP_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./:/var/www/html
      - uploads_data:/var/www/html/public/uploads
    depends_on:
      - db
    command: >
      sh -c "mkdir -p /var/www/html/public/uploads/articles
      && chown -R www-data:www-data /var/www/html/public/uploads
      && exec apache2-foreground"

  db:
    image: mysql:8.0
    container_name: iran-war-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

volumes:
  db_data:
  uploads_data:
