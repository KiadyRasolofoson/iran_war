services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iran-war-web
    ports:
      - "8080:80"
    env_file:
      - .env
    environment:
      APP_URL: ${APP_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./:/var/www/html
      - uploads_data:/var/www/html/public/uploads
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: iran-war-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  uploads_data:
